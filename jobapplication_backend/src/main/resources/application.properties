# H2 is a lightweight database that just saves to a local file --
# zero installation needed, perfect for learning/running locally.
spring.datasource.url=jdbc:h2:file:./jobtracker-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Automatically creates/updates tables to match your @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Optional: visit http://localhost:8080/h2-console to browse the database in a browser
spring.h2.console.enabled=true

server.port=8080
